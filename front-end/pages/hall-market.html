<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校易通 - 杂货铺</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="app-container hall-page">
        <header class="hall-header">
            <a href="user.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1 class="hall-title">杂货铺</h1>
            <button class="publish-btn-header" onclick="showProductPublish()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </header>

        <main class="hall-content">
            <div class="filter-bar">
                <div class="filter-group">
                    <label class="filter-label">分类：</label>
                    <select class="filter-select" id="categorySelect" onchange="onCategoryChange()">
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="search-box-compact">
                    <svg class="search-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" class="search-input-compact" placeholder="搜索商品..." id="productSearchInput">
                </div>
                <button class="reset-btn-filter" onclick="resetFilters()">重置</button>
            </div>

            <div class="product-grid full" id="fullProductList">
                <div class="loading-placeholder">加载中...</div>
            </div>
        </main>

        <div class="modal" id="productPublishModal">
            <div class="modal-content slide-up">
                <div class="modal-header">
                    <h3>发布闲置</h3>
                    <button class="modal-close" onclick="closeModal('productPublishModal')">×</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">商品图片（最多9张）</label>
                        <div class="image-upload-grid" id="imageUploadGrid">
                            <div class="upload-placeholder" onclick="uploadImage()">
                                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <path d="M21 15l-5-5L5 21"/>
                                </svg>
                                <span class="upload-text">点击上传</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">商品名称</label>
                            <input type="text" class="form-input" id="productName" placeholder="商品名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">价格</label>
                            <div class="input-prefix">
                                <span class="prefix">¥</span>
                                <input type="number" class="form-input" id="productPrice" placeholder="0.00">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="productCategory">
                            <option value="books">教材</option>
                            <option value="electronics">电子</option>
                            <option value="daily">生活</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">成色</label>
                        <select class="form-select" id="productCondition">
                            <option value="全新">全新</option>
                            <option value="99新">99新</option>
                            <option value="95新">95新</option>
                            <option value="9新">9新</option>
                            <option value="8新及以下">8新及以下</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">交易方式</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="tradeType" value="self" checked>
                                <span class="radio-mark"></span>
                                <span>自提</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="tradeType" value="express">
                                <span class="radio-mark"></span>
                                <span>快递</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="tradeType" value="both">
                                <span class="radio-mark"></span>
                                <span>都可以</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">商品描述</label>
                        <textarea class="form-textarea" id="productDesc" placeholder="描述商品的详细信息..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('productPublishModal')">取消</button>
                    <button class="btn-primary" onclick="submitProduct()">发布闲置</button>
                </div>
            </div>
        </div>

        <div class="modal" id="productDetailModal">
            <div class="modal-content slide-up large">
                <div class="modal-header">
                    <h3>商品详情</h3>
                    <button class="modal-close" onclick="closeModal('productDetailModal')">×</button>
                </div>
                <div class="modal-body" id="productDetailBody">
                </div>
            </div>
        </div>

        <div class="modal" id="ratingModal">
            <div class="modal-content slide-up">
                <div class="modal-header">
                    <h3>评价</h3>
                    <button class="modal-close" onclick="closeModal('ratingModal')">×</button>
                </div>
                <div class="modal-body">
                    <div class="rating-stars" id="ratingStars">
                        <span class="star" data-rating="1">☆</span>
                        <span class="star" data-rating="2">☆</span>
                        <span class="star" data-rating="3">☆</span>
                        <span class="star" data-rating="4">☆</span>
                        <span class="star" data-rating="5">☆</span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">评价内容</label>
                        <textarea class="form-textarea" id="ratingContent" placeholder="分享你的使用体验..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('ratingModal')">取消</button>
                    <button class="btn-primary" onclick="submitRating()">提交评价</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast">
            <span class="toast-icon"></span>
            <span class="toast-message"></span>
        </div>

        <script src="../js/api.js"></script>
        <script src="../js/hall-market.js"></script>
    </div>
</body>
</html>
