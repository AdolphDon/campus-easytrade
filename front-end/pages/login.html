<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyCampus - 登录注册</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <header class="site-brand" aria-label="品牌标识">
        <div class="site-brand-icon" aria-hidden="true">
            <svg class="site-brand-svg" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 4.5v11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M10 4.5C7.4 4.5 5 5.8 5 8.2v7.6c1.4-.7 3-.95 5-.95" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 4.5c2.6 0 5 1.3 5 3.7v7.6c-1.4-.7-3-.95-5-.95" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="site-brand-text">
            <h1 class="site-brand-title">EasyCampus</h1>
        </div>
    </header>

    <button type="button" class="register-trigger" id="openRegisterBtn" aria-haspopup="dialog" aria-controls="registerModal">
        注册
    </button>

    <div class="page-layout">
        <section class="hero-section" aria-label="欢迎">
            <p class="hero-tagline">CollegHelp · StuDuty · CamPals</p>
            <h2 class="hero-title">开启你的校园之旅</h2>
            <p class="hero-desc">连接校园每一个角落，让互助更简单，让闲置更有价值</p>
            <button type="button" class="hero-cta" id="scrollToLoginBtn">闲逛校园 →</button>
        </section>
    </div>

    <div class="container login-panel" id="loginSection" hidden>
            <div class="main-card" id="loginCard">
                <div class="login-card-header">
                    <button type="button" class="modal-close" id="closeLoginBtn" aria-label="关闭登录窗口">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M6 6l12 12M18 6L6 18"/>
                        </svg>
                    </button>
                </div>
                <div class="form-wrapper form-wrapper--login">
                    <form id="loginForm" class="auth-form active" aria-label="登录">
                        <div class="field">
                            <label class="field-label" for="loginUsername">用户名</label>
                            <div class="input-shell">
                                <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
                            </div>
                        </div>

                        <div class="field">
                            <label class="field-label" for="loginPassword">密码</label>
                            <div class="input-shell">
                                <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                    <rect x="5" y="11" width="14" height="10" rx="2"/>
                                    <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                                </svg>
                                <input type="password" id="loginPassword" class="pwd-input" placeholder="请输入密码" autocomplete="current-password">
                                <button type="button" class="eye-btn" aria-label="显示或隐藏密码" onclick="togglePassword('loginPassword', this)">
                                    <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                    <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 1 0 4.24 4.24"/><path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a19.5 19.5 0 0 1-3.55 4.8M6.12 6.12A19.5 19.5 0 0 0 1 12s4 7 11 7a10.3 10.3 0 0 0 4.09-.8"/></svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-row">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkmark">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </span>
                                <span class="checkbox-label">记住密码</span>
                            </label>
                            <a href="#" class="link-btn" onclick="openForgotPwdModal(); return false;">忘记密码？</a>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">登 录</span>
                            <span class="btn-loader"></span>
                        </button>
                    </form>
                </div>
            </div>
    </div>

    <div class="modal-overlay" id="registerModal" role="dialog" aria-modal="true" aria-labelledby="registerModalTitle" hidden>
        <div class="modal-backdrop" id="registerModalBackdrop"></div>
        <div class="modal-panel">
            <div class="main-card modal-card">
                <div class="modal-header">
                    <h2 class="modal-title" id="registerModalTitle">注册账号</h2>
                    <button type="button" class="modal-close" id="closeRegisterBtn" aria-label="关闭注册窗口">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M6 6l12 12M18 6L6 18"/>
                        </svg>
                    </button>
                </div>
                <div class="form-wrapper form-wrapper--register">
                    <form id="registerForm" class="auth-form active" aria-label="注册">
                        <section class="form-section">
                            <h3 class="form-section-title">账号信息</h3>
                            <div class="field">
                                <label class="field-label" for="regUsername">用户名</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                        <circle cx="12" cy="7" r="4"/>
                                    </svg>
                                    <input type="text" id="regUsername" placeholder="3–20 位字母、数字或下划线" autocomplete="username">
                                    <span class="validation-icon" id="usernameStatus" aria-live="polite"></span>
                                </div>
                            </div>
                            <div class="field">
                                <label class="field-label" for="regNickname">昵称</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <path d="M4 7h16M4 12h10M4 17h14"/>
                                    </svg>
                                    <input type="text" id="regNickname" placeholder="展示名称，最多 20 字">
                                </div>
                            </div>
                        </section>

                        <section class="form-section">
                            <h3 class="form-section-title">联系方式</h3>
                            <div class="field">
                                <label class="field-label" for="regEmail">QQ 邮箱</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <path d="M4 6h16v12H4z"/>
                                        <path d="M4 8l8 5 8-5"/>
                                    </svg>
                                    <input type="email" id="regEmail" placeholder="example@qq.com" autocomplete="email">
                                    <span class="validation-icon" id="emailStatus" aria-live="polite"></span>
                                </div>
                            </div>
                            <div class="field">
                                <label class="field-label" for="regPhone">手机号</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <rect x="7" y="3" width="10" height="18" rx="2"/>
                                        <path d="M11 18h2"/>
                                    </svg>
                                    <input type="tel" id="regPhone" placeholder="11 位中国大陆手机号" autocomplete="tel">
                                    <span class="validation-icon" id="phoneStatus" aria-live="polite"></span>
                                </div>
                            </div>
                        </section>

                        <section class="form-section form-section--password">
                            <h3 class="form-section-title">设置密码</h3>
                            <p class="form-section-desc">请设置 6–20 位密码，建议包含字母与数字。</p>
                            <div class="password-stack">
                                <div class="field field--tight">
                                    <label class="field-label" for="regPassword">登录密码</label>
                                    <div class="input-shell">
                                        <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                            <rect x="5" y="11" width="14" height="10" rx="2"/>
                                            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                                        </svg>
                                        <input type="password" id="regPassword" class="pwd-input" placeholder="输入密码" autocomplete="new-password">
                                        <button type="button" class="eye-btn" aria-label="显示或隐藏密码" onclick="togglePassword('regPassword', this)">
                                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 1 0 4.24 4.24"/><path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a19.5 19.5 0 0 1-3.55 4.8M6.12 6.12A19.5 19.5 0 0 0 1 12s4 7 11 7a10.3 10.3 0 0 0 4.09-.8"/></svg>
                                        </button>
                                    </div>
                                </div>

                                <div class="strength-meter" role="status" aria-live="polite">
                                    <div class="strength-bar" aria-hidden="true">
                                        <span class="strength-segment" data-level="1"></span>
                                        <span class="strength-segment" data-level="2"></span>
                                        <span class="strength-segment" data-level="3"></span>
                                        <span class="strength-segment" data-level="4"></span>
                                    </div>
                                    <span class="strength-label" id="strengthLabel">强度将随输入更新</span>
                                </div>

                                <div class="field field--tight">
                                    <label class="field-label" for="regConfirmPassword">确认密码</label>
                                    <div class="input-shell input-shell--confirm-pwd">
                                        <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                            <path d="M9 11l3 3L22 4"/>
                                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                                        </svg>
                                        <input type="password" id="regConfirmPassword" class="pwd-input" placeholder="再次输入密码" autocomplete="new-password">
                                        <span class="validation-icon validation-icon--confirm" id="confirmStatus" aria-live="polite"></span>
                                        <button type="button" class="eye-btn" aria-label="显示或隐藏确认密码" onclick="togglePassword('regConfirmPassword', this)">
                                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 1 0 4.24 4.24"/><path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a19.5 19.5 0 0 1-3.55 4.8M6.12 6.12A19.5 19.5 0 0 0 1 12s4 7 11 7a10.3 10.3 0 0 0 4.09-.8"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class="form-section">
                            <h3 class="form-section-title">邮箱验证</h3>
                            <div class="code-row">
                                <div class="field flex-grow">
                                    <label class="field-label" for="regCode">验证码</label>
                                    <div class="input-shell">
                                        <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                                            <path d="M8 8h.01M12 8h.01M16 8h.01M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01"/>
                                        </svg>
                                        <input type="text" id="regCode" placeholder="6 位数字" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                                    </div>
                                </div>
                                <button type="button" class="code-btn" id="sendCodeBtn" onclick="sendCode()">
                                    <span class="btn-normal">发送验证码</span>
                                    <span class="btn-countdown">60s</span>
                                </button>
                            </div>
                        </section>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">注册并登录</span>
                            <span class="btn-loader"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 忘记密码弹窗 -->
    <div class="modal-overlay" id="forgotPwdModal" role="dialog" aria-modal="true" aria-labelledby="forgotPwdModalTitle" hidden>
        <div class="modal-backdrop" id="forgotPwdModalBackdrop"></div>
        <div class="modal-panel">
            <div class="main-card modal-card">
                <div class="modal-header">
                    <h2 class="modal-title" id="forgotPwdModalTitle">找回密码</h2>
                    <button type="button" class="modal-close" id="closeForgotPwdBtn" aria-label="关闭">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M6 6l12 12M18 6L6 18"/>
                        </svg>
                    </button>
                </div>
                <div class="form-wrapper form-wrapper--register">
                    <form id="forgotPwdForm" class="auth-form active" aria-label="找回密码">
                        <section class="form-section">
                            <h3 class="form-section-title">验证身份</h3>
                            <div class="field">
                                <label class="field-label" for="fpEmail">QQ 邮箱</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <path d="M4 6h16v12H4z"/><path d="M4 8l8 5 8-5"/>
                                    </svg>
                                    <input type="email" id="fpEmail" placeholder="请输入绑定的QQ邮箱" autocomplete="email">
                                </div>
                            </div>
                            <div class="code-row">
                                <div class="field flex-grow">
                                    <label class="field-label" for="fpCode">验证码</label>
                                    <div class="input-shell">
                                        <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                                            <path d="M8 8h.01M12 8h.01M16 8h.01M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01"/>
                                        </svg>
                                        <input type="text" id="fpCode" placeholder="6 位数字" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                                    </div>
                                </div>
                                <button type="button" class="code-btn" id="fpSendCodeBtn" onclick="sendFpCode()">
                                    <span class="btn-normal">发送验证码</span>
                                    <span class="btn-countdown">60s</span>
                                </button>
                            </div>
                        </section>

                        <section class="form-section">
                            <h3 class="form-section-title">设置新密码</h3>
                            <p class="form-section-desc">请设置 6–20 位新密码。</p>
                            <div class="field">
                                <label class="field-label" for="fpPassword">新密码</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <rect x="5" y="11" width="14" height="10" rx="2"/>
                                        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                                    </svg>
                                    <input type="password" id="fpPassword" class="pwd-input" placeholder="输入新密码" autocomplete="new-password">
                                    <button type="button" class="eye-btn" aria-label="显示或隐藏密码" onclick="togglePassword('fpPassword', this)">
                                        <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                        <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 1 0 4.24 4.24"/><path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a19.5 19.5 0 0 1-3.55 4.8M6.12 6.12A19.5 19.5 0 0 0 1 12s4 7 11 7a10.3 10.3 0 0 0 4.09-.8"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="field">
                                <label class="field-label" for="fpConfirmPassword">确认新密码</label>
                                <div class="input-shell">
                                    <svg class="shell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                                    </svg>
                                    <input type="password" id="fpConfirmPassword" class="pwd-input" placeholder="再次输入新密码" autocomplete="new-password">
                                </div>
                            </div>
                        </section>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">重置密码</span>
                            <span class="btn-loader"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
