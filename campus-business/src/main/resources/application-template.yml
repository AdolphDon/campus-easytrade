server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript

spring:
  #环境配置
  profiles:
    active: dev
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher

  #数据库配置
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/campus-easytrade?useSSL=false&serverTimezone=UTC
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 30000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  #邮箱标准配置
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_ACCOUNT}
    password: ${MAIL_SMTP_CODE}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD}
    database: 1
    lettuce:
      pool:
        min-idle: 2
        max-idle: 8
        max-active: 16
        max-wait: 500ms
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: campus-easytrade
  #文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB     #单个文件最大 10MB
      max-request-size: 10MB  #整个请求最大 10MB

#RocketMQ配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: producer-group-campus

#支付宝沙箱配置
alipay:
  app-id: ${ALIPAY_APP_ID}
  app-private-key: ${ALIPAY_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  # 固定沙箱网关地址
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # 异步回调、同步跳转地址
  notify-url: ${PAY_NOTIFY_URL}

  # 佣金比例 = 0.05，即5%
  commission-ratio: 0.05
  # 连接超时（毫秒）
  connect-timeout: 15000
  # 读取超时（毫秒）
  read-timeout: 60000

#验证码过期时间（分钟）
app:
  email:
    code-expire-minutes: 5

#AI智能客服服务地址（Python FastAPI）
ai:
  service:
    url: http://localhost:8000

#异步线程池配置
async:
  thread-pool:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    thread-name-prefix: async-
    await-termination-seconds: 30

#接口白名单（无需JWT认证）
security:
  whitelist: /ws/**,/ai-api/**,/user/user/login,/user/user/register,/user/user/send-code,/user/user/forgot-password,/user/category/list,/error,/doc.html,/webjars/**,/swagger-resources/**,/v2/api-docs,/pay/notify

#令牌标准配置
jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration: 86400000 #统一过期时间24小时

#MyBatis
mybatis:
  # mapper XML文件路径
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名扫描包
  type-aliases-package: com.campus.entity
  configuration:
    # 开启下划线自动转驼峰映射
    map-underscore-to-camel-case: true

#日志
logging:
  level:
    # 全局日志级别
    root: INFO
    # 自定义包日志级别
    com.campus: DEBUG
    com.campus.mapper: DEBUG
    com.campus.service: DEBUG
    com.campus.controller: DEBUG
    com.campus.exception: DEBUG
  pattern:
    # 控制台输出日志格式
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"